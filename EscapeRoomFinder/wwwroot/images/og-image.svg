<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="150" fill="#e94560" opacity="0.1"/>
  <circle cx="1100" cy="530" r="200" fill="#0f3460" opacity="0.3"/>
  <circle cx="900" cy="100" r="100" fill="#e94560" opacity="0.05"/>

  <!-- Grid pattern -->
  <g opacity="0.03">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="1200" y1="0" x2="0" y2="630" stroke="white" stroke-width="1"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="315" x2="1200" y2="315" stroke="white" stroke-width="1"/>
  </g>

  <!-- Door icon -->
  <g transform="translate(540, 180)">
    <rect x="0" y="0" width="120" height="160" rx="8" fill="none" stroke="url(#accentGradient)" stroke-width="4"/>
    <circle cx="100" cy="90" r="8" fill="url(#accentGradient)"/>
    <rect x="20" y="20" width="80" height="50" rx="4" fill="url(#accentGradient)" opacity="0.2"/>
  </g>

  <!-- Main title -->
  <text x="600" y="400" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white" text-anchor="middle">
    Escape Room Finder
  </text>

  <!-- Tagline -->
  <text x="600" y="470" font-family="Arial, sans-serif" font-size="28" fill="#adb5bd" text-anchor="middle">
    Discover the best escape rooms near you
  </text>

  <!-- Accent line -->
  <rect x="450" y="500" width="300" height="4" rx="2" fill="url(#accentGradient)"/>

  <!-- Stats badges -->
  <g transform="translate(350, 540)">
    <rect x="0" y="0" width="150" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="75" y="27" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">8 Languages</text>
  </g>
  <g transform="translate(525, 540)">
    <rect x="0" y="0" width="150" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="75" y="27" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Global Coverage</text>
  </g>
  <g transform="translate(700, 540)">
    <rect x="0" y="0" width="150" height="40" rx="20" fill="rgba(255,255,255,0.1)"/>
    <text x="75" y="27" font-family="Arial, sans-serif" font-size="16" fill="white" text-anchor="middle">Free to Use</text>
  </g>
</svg>
