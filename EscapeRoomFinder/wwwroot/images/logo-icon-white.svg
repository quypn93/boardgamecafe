<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <!-- Door frame -->
  <rect x="8" y="4" width="32" height="40" rx="3" fill="#ffffff"/>

  <!-- Door inner panel -->
  <rect x="12" y="8" width="24" height="32" rx="2" fill="#e5e7eb"/>

  <!-- Door handle -->
  <circle cx="30" cy="24" r="3" fill="#fbbf24"/>

  <!-- Keyhole -->
  <ellipse cx="30" cy="24" rx="1.5" ry="2" fill="#9ca3af"/>
  <rect x="29" y="25" width="2" height="4" fill="#9ca3af"/>

  <!-- Top panel decoration -->
  <rect x="14" y="10" width="20" height="10" rx="1" fill="#d1d5db"/>

  <!-- Bottom panel decoration -->
  <rect x="14" y="24" width="20" height="14" rx="1" fill="#e5e7eb"/>
</svg>
