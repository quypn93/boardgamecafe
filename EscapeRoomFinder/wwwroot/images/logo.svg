<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <linearGradient id="doorGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Door icon -->
  <rect x="5" y="8" width="28" height="34" rx="2" fill="url(#doorGradient)"/>
  <rect x="8" y="11" width="22" height="28" rx="1" fill="#312e81"/>
  <circle cx="26" cy="25" r="2.5" fill="#fbbf24"/>

  <!-- Key hole -->
  <ellipse cx="26" cy="25" rx="1.5" ry="2" fill="#1e1b4b"/>
  <rect x="25" y="26" width="2" height="4" fill="#1e1b4b"/>

  <!-- Text: Escape Room Finder -->
  <text x="42" y="24" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937">Escape Room</text>
  <text x="42" y="40" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#4f46e5">Finder</text>
</svg>
