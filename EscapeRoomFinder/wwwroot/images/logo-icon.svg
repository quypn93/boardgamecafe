<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="doorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Door frame -->
  <rect x="8" y="4" width="32" height="40" rx="3" fill="url(#doorGrad)"/>

  <!-- Door inner panel -->
  <rect x="12" y="8" width="24" height="32" rx="2" fill="#312e81"/>

  <!-- Door handle -->
  <circle cx="30" cy="24" r="3" fill="#fbbf24"/>

  <!-- Keyhole -->
  <ellipse cx="30" cy="24" rx="1.5" ry="2" fill="#1e1b4b"/>
  <rect x="29" y="25" width="2" height="4" fill="#1e1b4b"/>

  <!-- Top panel decoration -->
  <rect x="14" y="10" width="20" height="10" rx="1" fill="#4338ca" opacity="0.5"/>

  <!-- Bottom panel decoration -->
  <rect x="14" y="24" width="20" height="14" rx="1" fill="#4338ca" opacity="0.3"/>
</svg>
