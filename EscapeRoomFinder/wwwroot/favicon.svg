<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad)"/>

  <!-- Door frame -->
  <rect x="9" y="6" width="14" height="20" rx="1.5" fill="#312e81"/>

  <!-- Door inner -->
  <rect x="11" y="8" width="10" height="16" rx="1" fill="#1e1b4b"/>

  <!-- Door handle/keyhole -->
  <circle cx="18" cy="16" r="1.5" fill="#fbbf24"/>
  <ellipse cx="18" cy="16" rx="0.8" ry="1.2" fill="#312e81"/>
  <rect x="17.5" y="16.5" width="1" height="2" fill="#312e81"/>

  <!-- Key icon at bottom -->
  <circle cx="16" cy="28" r="2" fill="#fbbf24"/>
  <rect x="17.5" y="26.5" width="5" height="1.5" rx="0.5" fill="#fbbf24"/>
  <rect x="20" y="25" width="1" height="2" fill="#fbbf24"/>
  <rect x="22" y="25" width="1" height="2" fill="#fbbf24"/>
</svg>
