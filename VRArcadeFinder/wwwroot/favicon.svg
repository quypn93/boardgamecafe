<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="faviconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#faviconGradient)"/>

  <!-- VR Headset -->
  <g transform="translate(4, 9)">
    <!-- Headset body -->
    <rect x="2" y="4" width="20" height="12" rx="3" fill="#ffffff"/>
    <!-- Left lens -->
    <circle cx="8" cy="10" r="3.5" fill="#1a1a2e"/>
    <circle cx="8" cy="10" r="2" fill="#00d4ff" opacity="0.7"/>
    <!-- Right lens -->
    <circle cx="16" cy="10" r="3.5" fill="#1a1a2e"/>
    <circle cx="16" cy="10" r="2" fill="#7b2ff7" opacity="0.7"/>
    <!-- Strap hints -->
    <path d="M2 8 Q-1 4 2 1" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
    <path d="M22 8 Q25 4 22 1" stroke="#ffffff" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>
</svg>