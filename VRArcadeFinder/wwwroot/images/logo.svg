<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 60">
  <defs>
    <linearGradient id="vrGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>

  <!-- VR Headset Icon -->
  <g transform="translate(5, 8)">
    <!-- Headset body -->
    <rect x="2" y="12" width="40" height="24" rx="6" fill="url(#vrGradient)"/>
    <!-- Left lens -->
    <circle cx="14" cy="24" r="7" fill="#1a1a2e"/>
    <circle cx="14" cy="24" r="4" fill="#00d4ff" opacity="0.6"/>
    <!-- Right lens -->
    <circle cx="30" cy="24" r="7" fill="#1a1a2e"/>
    <circle cx="30" cy="24" r="4" fill="#7b2ff7" opacity="0.6"/>
    <!-- Strap -->
    <path d="M2 20 Q-4 10 2 4" stroke="url(#vrGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M42 20 Q48 10 42 4" stroke="url(#vrGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Text: VR Arcade -->
  <text x="58" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#7b2ff7">VR</text>
  <text x="88" y="32" font-family="'Segoe UI', Arial, sans-serif" font-size="22" font-weight="700" fill="#333">Arcade</text>

  <!-- Text: Finder -->
  <text x="58" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="16" font-weight="400" fill="#666">Finder</text>
</svg>