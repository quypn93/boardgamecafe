<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>

  <!-- VR Headset Icon Only -->
  <g transform="translate(2, 10)">
    <!-- Headset body -->
    <rect x="2" y="8" width="40" height="22" rx="5" fill="url(#iconGradient)"/>
    <!-- Left lens -->
    <circle cx="14" cy="19" r="6" fill="#1a1a2e"/>
    <circle cx="14" cy="19" r="3.5" fill="#00d4ff" opacity="0.6"/>
    <!-- Right lens -->
    <circle cx="30" cy="19" r="6" fill="#1a1a2e"/>
    <circle cx="30" cy="19" r="3.5" fill="#7b2ff7" opacity="0.6"/>
    <!-- Strap -->
    <path d="M2 15 Q-3 8 2 2" stroke="url(#iconGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M42 15 Q47 8 42 2" stroke="url(#iconGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>